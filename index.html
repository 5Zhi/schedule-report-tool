<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Zhi Bag</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<style>
:root{--bg:#f6f7fb;--card:#fff;--text:#172033;--muted:#64748b;--line:#e2e8f0;--primary:#2563eb;--green:#16a34a;--orange:#f59e0b;--red:#dc2626;--purple:#8b5cf6;--shadow:0 10px 30px rgba(15,23,42,.08);--radius:18px}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;background:radial-gradient(circle at top left,#dbeafe,transparent 35%),var(--bg);color:var(--text);padding-bottom:88px}header{padding:30px 18px 12px;text-align:center}h1{margin:0;font-size:clamp(30px,6vw,48px);letter-spacing:-.05em}header p{margin:8px auto 0;max-width:820px;color:var(--muted);line-height:1.7}main{width:min(1180px,calc(100% - 28px));margin:0 auto}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin:14px 0}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}.stat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:15px;text-align:center;box-shadow:var(--shadow)}.stat b{display:block;font-size:28px;color:var(--primary)}label{display:block;margin:10px 0 6px;font-size:14px;font-weight:700;color:#334155}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px 13px;font:inherit;background:#fff;color:var(--text);outline:none}textarea{min-height:96px;resize:vertical}input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(37,99,235,.12)}button{border:0;border-radius:12px;padding:11px 15px;font:inherit;font-weight:800;cursor:pointer;background:#e2e8f0;color:#0f172a}button:hover{transform:translateY(-1px)}.btn{background:var(--primary);color:#fff}.green{background:#dcfce7;color:#166534}.red{background:#fee2e2;color:#991b1b}.orange{background:#fef3c7;color:#92400e}.purple{background:#ede9fe;color:#5b21b6}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.tabs{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.96);backdrop-filter:blur(10px);border-top:1px solid var(--line);display:none;justify-content:space-around;padding:8px 4px;z-index:20}.tabs button{background:transparent;color:var(--muted);font-size:12px;padding:7px 8px;display:flex;flex-direction:column;gap:2px;align-items:center}.tabs button.active{color:var(--primary);background:rgba(37,99,235,.08)}.ico{font-size:20px}.section{display:none}.section.active{display:block}.item{border:1px solid var(--line);border-radius:16px;background:#fff;padding:14px;margin:10px 0}.item h3{margin:0 0 7px;font-size:18px}.item p{margin:0;color:var(--muted);line-height:1.6}.meta{font-size:13px;color:var(--muted);margin-top:7px}.tag{display:inline-flex;align-items:center;padding:4px 10px;border-radius:999px;background:#eff6ff;color:#1d4ed8;font-size:12px;font-weight:800;margin:3px 4px 3px 0}.progress{height:11px;border-radius:999px;background:#e2e8f0;overflow:hidden;margin:9px 0}.bar{height:100%;background:linear-gradient(90deg,var(--primary),var(--purple));border-radius:999px}.empty{text-align:center;color:var(--muted);padding:32px}.login{max-width:420px;margin:40px auto}.hidden{display:none!important}.report{white-space:pre-wrap;background:#0f172a;color:#e2e8f0;border-radius:16px;padding:16px;line-height:1.75;min-height:220px;overflow:auto}.pillbar{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 12px}.pill{border:1px solid var(--line);background:#fff;color:#334155}.pill.active{background:var(--primary);color:#fff;border-color:var(--primary)}.split{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:860px){.split{grid-template-columns:1fr}.tabs button{font-size:11px;padding:6px 4px}.ico{font-size:18px}}
</style>
</head>
<body>
<header><h1>Zhi Bag</h1><p>把日程、灵感、背诵、知识库、年度计划和工作复盘装进一个随身工具包。</p></header>
<main>
<div id="loginBox" class="login card"><h2>登录 / 注册</h2><p class="meta">手机和电脑使用同一个账号即可同步。</p><label>邮箱</label><input id="email" type="email" placeholder="you@example.com"><label>密码</label><input id="password" type="password" placeholder="至少 6 位"><div class="actions"><button class="btn" onclick="login()">登录</button><button onclick="signup()">注册</button></div><p id="loginMsg" class="meta" style="color:var(--red)"></p></div>
<div id="app" class="hidden">
<section id="schedule" class="section active"><div id="scheduleStats" class="stats"></div><div class="card"><h2>日程</h2><div class="grid"><div><label>日期</label><input id="sDate" type="date"></div><div><label>分类</label><select id="sCategory"></select></div><div style="grid-column:1/-1"><label>日程内容</label><input id="sTitle" placeholder="今天要完成什么？"></div><div style="grid-column:1/-1"><label>备注</label><textarea id="sDesc" placeholder="结果、问题、下一步"></textarea></div></div><div class="actions"><button class="btn" onclick="addSchedule()">保存日程</button></div></div><div class="card"><div class="pillbar"><button class="pill active" onclick="setFilter('schedule','all',this)">全部</button><button class="pill" onclick="setFilter('schedule','today',this)">今天</button><button class="pill" onclick="setFilter('schedule','week',this)">本周</button><button class="pill" onclick="setFilter('schedule','done',this)">已完成</button><input id="sSearch" placeholder="搜索日程" oninput="renderSchedules()" style="max-width:220px"></div><div id="scheduleList"></div></div></section>
<section id="idea" class="section"><div id="ideaStats" class="stats"></div><div class="card"><h2>灵感记录</h2><label>灵感内容</label><textarea id="ideaContent" placeholder="突然想到的点子、观察、问题、句子……"></textarea><label>标签</label><input id="ideaTags" placeholder="用逗号分隔，例如：产品,写作,商业"><div class="actions"><button class="btn" onclick="addIdea()">记录灵感</button></div></div><div class="card"><input id="ideaSearch" placeholder="搜索灵感或标签" oninput="renderIdeas()"><div id="ideaList"></div></div></section>
<section id="recite" class="section"><div id="reciteStats" class="stats"></div><div class="card"><h2>背诵模块</h2><div class="grid"><div><label>标题</label><input id="rTitle" placeholder="文字标题"></div><div><label>来源</label><input id="rSource" placeholder="书名 / 作者 / 文章"></div><div style="grid-column:1/-1"><label>上传文字文件</label><input id="rFile" type="file" accept=".txt,.md,.text"></div><div style="grid-column:1/-1"><label>文字内容</label><textarea id="rContent" placeholder="也可以直接粘贴你喜欢的文字"></textarea></div><div><label>熟练度</label><select id="rLevel"><option>刚开始</option><option>熟悉中</option><option>基本会背</option><option>已掌握</option></select></div></div><div class="actions"><button class="btn" onclick="addRecite()">保存背诵内容</button></div></div><div class="card"><input id="reciteSearch" placeholder="搜索标题、来源或正文" oninput="renderRecites()"><div id="reciteList"></div></div></section>
<section id="knowledge" class="section"><div id="knowledgeStats" class="stats"></div><div class="card"><h2>知识库</h2><div class="grid"><div><label>标题</label><input id="kTitle" placeholder="知识条目或书籍名称"></div><div><label>标签</label><input id="kTags" placeholder="技能,AI,写作,销售"></div><div style="grid-column:1/-1"><label>上传学习资料</label><input id="kFile" type="file" accept=".txt,.md,.text"></div><div style="grid-column:1/-1"><label>内容 / 摘要</label><textarea id="kContent" placeholder="粘贴书籍摘录、课程笔记、技能方法论"></textarea></div></div><div class="actions"><button class="btn" onclick="addKnowledge()">保存到知识库</button></div></div><div class="card"><div class="grid"><input id="kSearch" placeholder="全文搜索：标题、标签、内容" oninput="renderKnowledge()"><input id="kTagFilter" placeholder="按标签筛选" oninput="renderKnowledge()"></div><div id="knowledgeList"></div></div></section>
<section id="plan" class="section"><div id="planStats" class="stats"></div><div class="card"><h2>年度计划</h2><div class="grid"><div><label>事项</label><input id="pTitle" placeholder="例如：背诵、阅读、复盘、运动"></div><div><label>年度目标次数</label><input id="pTarget" type="number" min="1" placeholder="例如：100"></div><div><label>年份</label><input id="pYear" type="number"></div><div><label>备注</label><input id="pNote" placeholder="为什么做这件事？"></div></div><div class="actions"><button class="btn" onclick="addPlan()">添加年度计划</button></div></div><div id="planList"></div></section>
<section id="project" class="section"><div id="projectStats" class="stats"></div><div class="card"><h2>工作项目进度</h2><div class="grid"><div><label>项目名称</label><input id="pjName"></div><div><label>截止日期</label><input id="pjDue" type="date"></div><div style="grid-column:1/-1"><label>项目说明</label><textarea id="pjDesc"></textarea></div></div><div class="actions"><button class="btn" onclick="addProject()">创建项目</button></div></div><div id="projectList"></div></section>
<section id="ai" class="section"><div class="card"><h2>AI 工作分析</h2><p class="meta">当前版本先提供安全的本地分析和“复制给 AI 的材料”。如果要真正接入 OpenAI、通义千问、Kimi 等 API，建议后续加一个后端代理，避免密钥暴露在网页里。</p><div class="actions"><button class="btn" onclick="generateAIAnalysis()">生成本地分析</button><button onclick="copyAIPrompt()">复制给 AI 的分析材料</button></div><div id="aiOutput" class="report" style="margin-top:12px"></div></div></section>
</div>
</main>
<nav id="nav" class="tabs"><button class="active" onclick="tab('schedule',this)"><span class="ico">📅</span>日程</button><button onclick="tab('idea',this)"><span class="ico">💡</span>灵感</button><button onclick="tab('recite',this)"><span class="ico">📖</span>背诵</button><button onclick="tab('knowledge',this)"><span class="ico">🧠</span>知识库</button><button onclick="tab('plan',this)"><span class="ico">🎯</span>年度</button><button onclick="tab('project',this)"><span class="ico">📊</span>项目</button><button onclick="tab('ai',this)"><span class="ico">🤖</span>AI</button></nav>
<script>
const SUPABASE_URL='https://xvhpxhjyszrrfbyuaozb.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_RWO4RqhxpD02NC6e4Y890Q_w1dlNnnp';
const db=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
let user=null,categories=[],schedules=[],ideas=[],recites=[],knowledge=[],plans=[],projects=[],tasks=[];
let filters={schedule:'all'};
const $=id=>document.getElementById(id);const today=()=>new Date(Date.now()-new Date().getTimezoneOffset()*60000).toISOString().slice(0,10);const esc=s=>{const d=document.createElement('div');d.textContent=s||'';return d.innerHTML};const tags=s=>(s||'').split(/[,，]/).map(x=>x.trim()).filter(Boolean);
$('sDate').value=today();$('pYear').value=new Date().getFullYear();
async function signup(){const email=$('email').value.trim(),password=$('password').value;if(!email||!password)return msg('请填写邮箱和密码');const {error}=await db.auth.signUp({email,password});msg(error?error.message:'注册成功。如开启邮箱确认，请先去邮箱点击确认链接。')}
async function login(){const email=$('email').value.trim(),password=$('password').value;if(!email||!password)return msg('请填写邮箱和密码');const {data,error}=await db.auth.signInWithPassword({email,password});if(error)return msg(error.message);user=data.user;showApp()}
function msg(t){$('loginMsg').textContent=t}
async function init(){const {data}=await db.auth.getSession();if(data.session){user=data.session.user;showApp()} $('rFile').onchange=e=>readFile(e,'rContent','rTitle');$('kFile').onchange=e=>readFile(e,'kContent','kTitle')}
function showApp(){$('loginBox').classList.add('hidden');$('app').classList.remove('hidden');$('nav').style.display='flex';loadAll()}
function tab(id,btn){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));$(id).classList.add('active');document.querySelectorAll('#nav button').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}
function readFile(e,contentId,titleId){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{if(!$(titleId).value)$(titleId).value=f.name.replace(/\.[^.]+$/,'');$(contentId).value=r.result};r.readAsText(f)}
async function loadAll(){await Promise.all([loadCategories(),loadSchedules(),loadIdeas(),loadRecites(),loadKnowledge(),loadPlans(),loadProjects()])}
async function loadCategories(){const {data}=await db.from('categories').select('*').order('name');categories=data||[];$('sCategory').innerHTML='<option value="">不分类</option>'+categories.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('')}
async function loadSchedules(){const {data}=await db.from('schedules').select('*').eq('user_id',user.id).order('date',{ascending:false});schedules=data||[];renderSchedules()}
async function loadIdeas(){const {data}=await db.from('ideas').select('*').eq('user_id',user.id).order('created_at',{ascending:false});ideas=data||[];renderIdeas()}
async function loadRecites(){const {data}=await db.from('recitations').select('*').eq('user_id',user.id).order('created_at',{ascending:false});recites=data||[];renderRecites()}
async function loadKnowledge(){const {data}=await db.from('knowledge_items').select('*').eq('user_id',user.id).order('created_at',{ascending:false});knowledge=data||[];renderKnowledge()}
async function loadPlans(){const {data}=await db.from('annual_plans').select('*').eq('user_id',user.id).order('created_at',{ascending:false});plans=data||[];renderPlans()}
async function loadProjects(){const {data:p}=await db.from('projects').select('*').eq('user_id',user.id).order('created_at',{ascending:false});projects=p||[];if(projects.length){const {data:t}=await db.from('project_tasks').select('*').in('project_id',projects.map(x=>x.id));tasks=t||[]}else tasks=[];renderProjects()}
function stat(el,arr){$(el).innerHTML=arr.map(x=>`<div class="stat"><b>${x[0]}</b><span>${x[1]}</span></div>`).join('')}
async function addSchedule(){if(!$('sTitle').value.trim())return alert('请填写日程内容');await db.from('schedules').insert({user_id:user.id,title:$('sTitle').value.trim(),category_id:$('sCategory').value||null,date:$('sDate').value,description:$('sDesc').value.trim(),start_time:null,end_time:null});$('sTitle').value='';$('sDesc').value='';loadSchedules()}
async function toggleSchedule(id,done){await db.from('schedules').update({completed:!done}).eq('id',id);loadSchedules()}async function delSchedule(id){if(confirm('确定删除？')){await db.from('schedules').delete().eq('id',id);loadSchedules()}}
function setFilter(type,val,btn){filters[type]=val;btn.parentElement.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));btn.classList.add('active');renderSchedules()}
function renderSchedules(){let list=[...schedules],q=$('sSearch')?.value.toLowerCase()||'';if(filters.schedule==='today')list=list.filter(x=>x.date===today());if(filters.schedule==='week'){let d=new Date(),day=d.getDay()||7,s=new Date(d),e=new Date(d);s.setDate(d.getDate()-day+1);e.setDate(d.getDate()+7-day);let a=s.toISOString().slice(0,10),b=e.toISOString().slice(0,10);list=list.filter(x=>x.date>=a&&x.date<=b)}if(filters.schedule==='done')list=list.filter(x=>x.completed);if(q)list=list.filter(x=>(x.title+x.description).toLowerCase().includes(q));stat('scheduleStats',[[schedules.length,'总日程'],[schedules.filter(x=>x.completed).length,'已完成'],[schedules.filter(x=>x.date===today()).length,'今天'],[schedules.filter(x=>!x.completed).length,'未完成']]);$('scheduleList').innerHTML=list.length?list.map(x=>`<div class="item"><h3 ${x.completed?'style="text-decoration:line-through;opacity:.55"':''}>${esc(x.title)}</h3><p>${esc(x.description)}</p><div class="meta">${x.date}</div><div class="actions"><button class="green" onclick="toggleSchedule('${x.id}',${x.completed})">${x.completed?'取消完成':'完成'}</button><button class="red" onclick="delSchedule('${x.id}')">删除</button></div></div>`).join(''):'<div class="empty">暂无日程</div>'}
async function addIdea(){let content=$('ideaContent').value.trim();if(!content)return alert('请输入灵感');await db.from('ideas').insert({user_id:user.id,content,tags:tags($('ideaTags').value)});$('ideaContent').value='';$('ideaTags').value='';loadIdeas()}async function delIdea(id){if(confirm('删除灵感？')){await db.from('ideas').delete().eq('id',id);loadIdeas()}}
function renderIdeas(){let q=$('ideaSearch')?.value.toLowerCase()||'',list=ideas.filter(x=>(x.content+(x.tags||[]).join(',')).toLowerCase().includes(q));stat('ideaStats',[[ideas.length,'总灵感'],[ideas.filter(x=>(x.created_at||'').startsWith(today())).length,'今日新增'],[[...new Set(ideas.flatMap(x=>x.tags||[]))].length,'标签数']]);$('ideaList').innerHTML=list.length?list.map(x=>`<div class="item"><p>${esc(x.content)}</p><div>${(x.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div><div class="meta">${(x.created_at||'').slice(0,16).replace('T',' ')}</div><div class="actions"><button class="red" onclick="delIdea('${x.id}')">删除</button></div></div>`).join(''):'<div class="empty">暂无灵感</div>'}
async function addRecite(){let title=$('rTitle').value.trim(),content=$('rContent').value.trim();if(!title||!content)return alert('请填写标题和内容');await db.from('recitations').insert({user_id:user.id,title,source:$('rSource').value.trim(),content,level:$('rLevel').value,review_count:0});['rTitle','rSource','rContent'].forEach(id=>$(id).value='');loadRecites()}async function reviewRecite(id,c){await db.from('recitations').update({review_count:(c||0)+1,last_reviewed_at:new Date().toISOString()}).eq('id',id);loadRecites()}async function delRecite(id){if(confirm('删除背诵内容？')){await db.from('recitations').delete().eq('id',id);loadRecites()}}
function renderRecites(){let q=$('reciteSearch')?.value.toLowerCase()||'',list=recites.filter(x=>(x.title+x.source+x.content).toLowerCase().includes(q));stat('reciteStats',[[recites.length,'背诵篇目'],[recites.reduce((a,b)=>a+(b.review_count||0),0),'复习次数'],[recites.filter(x=>x.level==='已掌握').length,'已掌握']]);$('reciteList').innerHTML=list.length?list.map(x=>`<div class="item"><h3>${esc(x.title)}</h3><p>${esc((x.content||'').slice(0,220))}${(x.content||'').length>220?'...':''}</p><div class="meta">来源：${esc(x.source)}｜熟练度：${esc(x.level)}｜复习 ${x.review_count||0} 次</div><div class="actions"><button class="green" onclick="reviewRecite('${x.id}',${x.review_count||0})">复习一次</button><button class="red" onclick="delRecite('${x.id}')">删除</button></div></div>`).join(''):'<div class="empty">暂无背诵内容</div>'}
async function addKnowledge(){let title=$('kTitle').value.trim(),content=$('kContent').value.trim();if(!title||!content)return alert('请填写标题和内容');await db.from('knowledge_items').insert({user_id:user.id,title,content,tags:tags($('kTags').value)});['kTitle','kTags','kContent'].forEach(id=>$(id).value='');loadKnowledge()}async function delKnowledge(id){if(confirm('删除知识条目？')){await db.from('knowledge_items').delete().eq('id',id);loadKnowledge()}}
function renderKnowledge(){let q=$('kSearch')?.value.toLowerCase()||'',tag=$('kTagFilter')?.value.toLowerCase()||'',list=knowledge.filter(x=>(x.title+x.content+(x.tags||[]).join(',')).toLowerCase().includes(q)).filter(x=>!tag||(x.tags||[]).join(',').toLowerCase().includes(tag));stat('knowledgeStats',[[knowledge.length,'知识条目'],[[...new Set(knowledge.flatMap(x=>x.tags||[]))].length,'标签数'],[list.length,'当前结果']]);$('knowledgeList').innerHTML=list.length?list.map(x=>`<div class="item"><h3>${esc(x.title)}</h3><div>${(x.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div><p>${esc((x.content||'').slice(0,260))}${(x.content||'').length>260?'...':''}</p><div class="actions"><button class="red" onclick="delKnowledge('${x.id}')">删除</button></div></div>`).join(''):'<div class="empty">暂无知识内容</div>'}
async function addPlan(){let title=$('pTitle').value.trim(),target=Number($('pTarget').value),year=Number($('pYear').value);if(!title||!target)return alert('请填写事项和目标次数');await db.from('annual_plans').insert({user_id:user.id,title,target_count:target,completed_count:0,year,note:$('pNote').value.trim()});['pTitle','pTarget','pNote'].forEach(id=>$(id).value='');loadPlans()}async function incPlan(id,c){await db.from('annual_plans').update({completed_count:c+1}).eq('id',id);loadPlans()}async function delPlan(id){if(confirm('删除年度计划？')){await db.from('annual_plans').delete().eq('id',id);loadPlans()}}
function renderPlans(){let year=new Date().getFullYear(),total=plans.filter(x=>x.year===year).length;stat('planStats',[[plans.length,'计划数'],[total,'今年计划'],[plans.reduce((a,b)=>a+(b.completed_count||0),0),'完成次数']]);$('planList').innerHTML=plans.length?plans.map(x=>{let pct=Math.min(100,Math.round((x.completed_count||0)/(x.target_count||1)*100));return `<div class="card"><h3>${esc(x.title)} <span class="tag">${x.year}</span></h3><p>${esc(x.note)}</p><div class="progress"><div class="bar" style="width:${pct}%"></div></div><div class="meta">${x.completed_count||0}/${x.target_count} 次，进度 ${pct}%</div><div class="actions"><button class="green" onclick="incPlan('${x.id}',${x.completed_count||0})">完成一次</button><button class="red" onclick="delPlan('${x.id}')">删除</button></div></div>`}).join(''):'<div class="empty">暂无年度计划</div>'}
async function addProject(){let name=$('pjName').value.trim();if(!name)return alert('请填写项目名称');await db.from('projects').insert({user_id:user.id,name,description:$('pjDesc').value.trim(),due_date:$('pjDue').value||null,status:'progress'});['pjName','pjDesc','pjDue'].forEach(id=>$(id).value='');loadProjects()}async function delProject(id){if(confirm('删除项目？')){await db.from('project_tasks').delete().eq('project_id',id);await db.from('projects').delete().eq('id',id);loadProjects()}}async function addTask(pid){let title=prompt('输入流程/任务名称');if(title)await db.from('project_tasks').insert({project_id:pid,title,completed:false});loadProjects()}async function toggleTask(id,done){await db.from('project_tasks').update({completed:!done}).eq('id',id);loadProjects()}
function renderProjects(){stat('projectStats',[[projects.length,'项目数'],[projects.filter(x=>x.status==='done').length,'已完成'],[tasks.filter(x=>x.completed).length,'完成流程']]);$('projectList').innerHTML=projects.length?projects.map(p=>{let ts=tasks.filter(t=>t.project_id===p.id),done=ts.filter(t=>t.completed).length,pct=ts.length?Math.round(done/ts.length*100):0;return `<div class="card"><h3>${esc(p.name)}</h3><p>${esc(p.description)}</p><div class="progress"><div class="bar" style="width:${pct}%"></div></div><div class="meta">进度 ${pct}% (${done}/${ts.length}) ${p.due_date?'｜截止 '+p.due_date:''}</div>${ts.map(t=>`<div class="item" style="margin:7px 0"><label style="display:flex;gap:8px;align-items:center;margin:0"><input type="checkbox" ${t.completed?'checked':''} onchange="toggleTask('${t.id}',${t.completed})" style="width:18px">${esc(t.title)}</label></div>`).join('')}<div class="actions"><button class="btn" onclick="addTask('${p.id}')">添加流程</button><button class="red" onclick="delProject('${p.id}')">删除项目</button></div></div>`}).join(''):'<div class="empty">暂无项目</div>'}
function generateAIAnalysis(){let undone=schedules.filter(x=>!x.completed),done=schedules.filter(x=>x.completed),activeProjects=projects.map(p=>{let ts=tasks.filter(t=>t.project_id===p.id),d=ts.filter(t=>t.completed).length;return {name:p.name,pct:ts.length?Math.round(d/ts.length*100):0,due:p.due_date}});let weak=plans.filter(p=>(p.completed_count||0)/(p.target_count||1)<0.3);let lines=['# Zhi Bag 本地分析','','## 工作计划进度',`- 日程完成：${done.length}/${schedules.length}`,...activeProjects.map(p=>`- 项目「${p.name}」进度 ${p.pct}%${p.due?'，截止 '+p.due:''}`),'','## 优点',done.length?'你已经有持续记录和完成事项，说明执行链路正在形成。':'你已经开始把计划集中记录，这是建立执行系统的第一步。',ideas.length?`灵感库已有 ${ideas.length} 条，说明你在持续捕捉想法。`:'可以开始记录灵感，避免想法流失。','','## 风险和短板',undone.length?`仍有 ${undone.length} 个未完成日程，建议每天只保留 1-3 个关键事项。`:'当前未完成日程较少，保持即可。',weak.length?`年度计划中有 ${weak.length} 项进度偏低，需要拆成每周目标。`:'年度计划进度整体可控。','','## 建议','- 每天固定一次复盘：完成了什么、卡在哪里、明天最重要的一件事。','- 项目流程尽量拆成可勾选的小任务，不要只写大目标。','- 知识库内容建议用标签分类，并定期把灵感转成项目或行动。'];$('aiOutput').textContent=lines.join('\n')}
function aiPrompt(){return `请作为我的工作和学习教练，分析以下 Zhi Bag 数据，指出进度、优点、短板和下一步建议。\n\n日程：${JSON.stringify(schedules)}\n\n年度计划：${JSON.stringify(plans)}\n\n项目：${JSON.stringify(projects)}\n\n项目任务：${JSON.stringify(tasks)}\n\n灵感数量：${ideas.length}\n知识库条目：${knowledge.length}\n背诵篇目：${recites.length}`}
function copyAIPrompt(){navigator.clipboard.writeText(aiPrompt()).then(()=>alert('已复制，可以粘贴给 ChatGPT / Kimi / 通义千问分析'))}
init();
</script>
