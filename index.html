<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>日程灵感项目提醒工具</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<style>
:root {
  --bg: #f6f7fb;
  --card: #ffffff;
  --text: #172033;
  --muted: #64748b;
  --line: #e2e8f0;
  --primary: #2563eb;
  --primary-dark: #1d4ed8;
  --success: #16a34a;
  --warning: #f59e0b;
  --danger: #dc2626;
  --purple: #8b5cf6;
  --pink: #ec4899;
  --shadow: 0 10px 30px rgba(15,23,42,0.08);
  --radius: 18px;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
  background: radial-gradient(circle at top left, #dbeafe, transparent 35%), var(--bg);
  color: var(--text);
  padding-bottom: 80px;
}
header {
  padding: 34px 18px 12px;
  text-align: center;
}
header h1 {
  margin: 0;
  font-size: clamp(26px,5vw,40px);
  letter-spacing: -0.04em;
}
header p {
  max-width: 780px;
  margin: 8px auto 0;
  color: var(--muted);
  line-height: 1.7;
}
main {
  width: min(1180px, calc(100% - 28px));
  margin: 0 auto;
}
section { display: none; }
section.active { display: block; }
.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 22px 22px 18px;
  margin-bottom: 18px;
}
.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 12px;
}
label {
  font-size: 14px;
  color: var(--muted);
  display: block;
  margin-bottom: 6px;
}
input, select, textarea {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 12px 14px;
  font-size: 16px;
  background: #fff;
  color: var(--text);
  outline: none;
}
input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.12); }
textarea { resize: vertical; min-height: 90px; }
button {
  border: none;
  border-radius: 12px;
  padding: 12px 18px;
  font-size: 15px;
  cursor: pointer;
  transition: transform .06s ease, opacity .2s ease;
}
button:active { transform: scale(.98); }
.btn { background: var(--primary); color: #fff; }
.btn:hover { background: var(--primary-dark); }
.btn-sm { padding: 8px 14px; font-size: 14px; border-radius: 10px; }
.btn-success { background: var(--success); color: #fff; }
.btn-warning { background: var(--warning); color: #fff; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-outline {
  background: transparent;
  border: 1px solid var(--line);
  color: var(--text);
}
.filter-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 14px;
  align-items: center;
}
.tag {
  display: inline-block;
  padding: 6px 14px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--line);
  background: #fff;
}
.tag.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.list { display: grid; gap: 12px; }
.item {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 14px 16px;
  position: relative;
}
.item h3 { margin: 0 0 6px; font-size: 18px; }
.item p { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.5; }
.item .meta { font-size: 13px; color: var(--muted); margin-top: 8px; }
.item .actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.completed { text-decoration: line-through; opacity: .55; }
.progress-wrap { background: var(--line); border-radius: 999px; height: 10px; margin: 8px 0; overflow: hidden; }
.progress-bar { height: 100%; background: var(--primary); border-radius: 999px; transition: width .3s ease; }
.empty { text-align: center; color: var(--muted); padding: 40px 20px; }
#login { max-width: 400px; margin: 0 auto; padding-top: 60px; }
#app { display: none; }
#app.visible { display: block; }
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(10px);
  border-top: 1px solid var(--line);
  display: flex;
  justify-content: space-around;
  padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
  z-index: 100;
}
.nav-btn {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 13px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 6px 16px;
  border-radius: 12px;
}
.nav-btn.active { color: var(--primary); background: rgba(37,99,235,0.08); }
.nav-icon { font-size: 20px; }
.task-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid var(--line);
}
.task-row:last-child { border-bottom: none; }
.task-done { text-decoration: line-through; opacity: .5; }
.notification-banner {
  background: linear-gradient(135deg, #3b82f6, #8b5cf6);
  color: #fff;
  padding: 14px 18px;
  border-radius: 14px;
  margin-bottom: 14px;
  display: none;
}
.notification-banner.visible { display: block; }
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px,1fr));
  gap: 12px;
  margin-bottom: 18px;
}
.stat-card {
  background: var(--card);
  border-radius: 14px;
  padding: 16px;
  text-align: center;
  box-shadow: var(--shadow);
}
.stat-num { font-size: 28px; font-weight: 700; color: var(--primary); }
.stat-label { font-size: 13px; color: var(--muted); margin-top: 4px; }
.reminder-item { display: flex; align-items: center; gap: 12px; }
.reminder-time { font-size: 13px; color: var(--muted); white-space: nowrap; }
.reminder-content { flex: 1; }
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  display: none; align-items: center; justify-content: center;
  z-index: 200; padding: 20px;
}
.modal-overlay.visible { display: flex; }
.modal {
  background: var(--card);
  border-radius: var(--radius);
  width: min(520px, 100%);
  max-height: 85vh;
  overflow-y: auto;
  padding: 22px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.modal h2 { margin-top: 0; }
.checkbox { width: 20px; height: 20px; accent-color: var(--primary); }
.drag-handle { cursor: grab; color: var(--muted); font-size: 18px; }
.project-status {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
}
.status-planning { background: #e0e7ff; color: #3730a3; }
.status-progress { background: #dcfce7; color: #14532d; }
.status-review { background: #fef3c7; color: #78350f; }
.status-done { background: #dbeafe; color: #1e3a8a; }
</style>
</head>
<body>

<header>
  <h1 id="app-title">日程灵感项目提醒工具</h1>
  <p id="app-subtitle">记录日程、捕捉灵感、管理项目进度、设置智能提醒</p>
</header>

<main>
  <div id="login">
    <div class="card">
      <h2 style="margin-top:0">登录 / 注册</h2>
      <p style="color:var(--muted)">手机和电脑同步需登录同一个账号</p>
      <div class="form-grid" style="grid-template-columns:1fr;margin-top:14px">
        <div><label>邮箱</label><input type="email" id="login-email" placeholder="your@email.com" /></div>
        <div><label>密码</label><input type="password" id="login-password" placeholder="******" /></div>
      </div>
      <div style="display:flex;gap:10px;margin-top:14px">
        <button class="btn" onclick="handleLogin()">登录</button>
        <button class="btn-outline" onclick="handleRegister()">注册</button>
      </div>
      <p id="login-msg" style="color:var(--danger);margin-top:10px;font-size:14px"></p>
    </div>
  </div>

  <div id="app">
    <div class="notification-banner" id="notify-banner">
      <div style="display:flex;align-items:center;gap:10px;justify-content:space-between">
        <span>启用浏览器提醒，到点自动通知您</span>
        <button class="btn-sm btn-success" onclick="requestNotification()">开启提醒</button>
      </div>
    </div>

    <section id="sec-schedule" class="active">
      <div class="stats-grid" id="schedule-stats"></div>
      <div class="card">
        <h3 style="margin-top:0">新增日程</h3>
        <div class="form-grid">
          <div><label>标题</label><input id="s-title" placeholder="做什么..." /></div>
          <div><label>分类</label><select id="s-category"></select></div>
          <div><label>日期</label><input type="date" id="s-date" /></div>
          <div><label>开始时间</label><input type="time" id="s-start" /></div>
          <div><label>结束时间</label><input type="time" id="s-end" /></div>
          <div><label>描述</label><input id="s-desc" placeholder="备注..." /></div>
        </div>
        <div style="margin-top:12px"><button class="btn" onclick="addSchedule()">添加日程</button></div>
      </div>
      <div class="card">
        <div class="filter-row">
          <span class="tag active" onclick="filterSchedule('all',this)">全部</span>
          <span class="tag" onclick="filterSchedule('today',this)">今天</span>
          <span class="tag" onclick="filterSchedule('week',this)">本周</span>
          <span class="tag" onclick="filterSchedule('month',this)">本月</span>
          <span class="tag" onclick="filterSchedule('completed',this)">已完成</span>
          <input id="s-search" placeholder="搜索..." style="max-width:200px" oninput="renderSchedules()" />
        </div>
        <div class="list" id="schedule-list"></div>
      </div>
      <div class="card">
        <h3 style="margin-top:0">生成报告</h3>
        <div class="filter-row">
          <span class="tag active" onclick="setReportType('day',this)">日报</span>
          <span class="tag" onclick="setReportType('week',this)">周报</span>
          <span class="tag" onclick="setReportType('month',this)">月报</span>
        </div>
        <div id="report-output" style="white-space:pre-wrap;background:#f8fafc;border-radius:12px;padding:16px;line-height:1.7;color:#334155"></div>
        <div style="display:flex;gap:10px;margin-top:12px;flex-wrap:wrap">
          <button class="btn" onclick="copyReport()">复制报告</button>
          <button class="btn-outline" onclick="downloadReport()">下载报告</button>
        </div>
      </div>
    </section>

    <section id="sec-inspiration">
      <div class="stats-grid" id="inspiration-stats"></div>
      <div class="card">
        <h3 style="margin-top:0">快速记录灵感</h3>
        <div class="form-grid">
          <div style="grid-column:1/-1"><textarea id="i-content" placeholder="突然想到一个好点子？马上记下来..."></textarea></div>
          <div><label>分类标签</label><input id="i-category" placeholder="创意 / 问题 / 想法 / 待研究..." /></div>
          <div style="display:flex;align-items:end"><button class="btn" onclick="addInspiration()">记录灵感</button></div>
        </div>
      </div>
      <div class="card">
        <div class="filter-row">
          <span class="tag active" onclick="filterInspiration('all',this)">全部</span>
          <span class="tag" onclick="filterInspiration('today',this)">今天</span>
          <span class="tag" onclick="filterInspiration('week',this)">本周</span>
          <input id="i-search" placeholder="搜索灵感..." style="max-width:200px" oninput="renderInspirations()" />
        </div>
        <div class="list" id="inspiration-list"></div>
      </div>
    </section>

    <section id="sec-project">
      <div class="stats-grid" id="project-stats"></div>
      <div class="card">
        <h3 style="margin-top:0">新建项目</h3>
        <div class="form-grid">
          <div><label>项目名称</label><input id="p-name" placeholder="项目名称..." /></div>
          <div><label>项目描述</label><input id="p-desc" placeholder="一句话描述..." /></div>
          <div><label>截止日期</label><input type="date" id="p-due" /></div>
          <div style="display:flex;align-items:end"><button class="btn" onclick="addProject()">创建项目</button></div>
        </div>
      </div>
      <div class="list" id="project-list"></div>
    </section>

    <section id="sec-reminder">
      <div class="stats-grid" id="reminder-stats"></div>
      <div class="card">
        <h3 style="margin-top:0">新建提醒</h3>
        <div class="form-grid">
          <div><label>提醒标题</label><input id="r-title" placeholder="提醒内容..." /></div>
          <div><label>提醒时间</label><input type="datetime-local" id="r-time" /></div>
          <div style="display:flex;align-items:end"><button class="btn" onclick="addReminder()">设置提醒</button></div>
        </div>
      </div>
      <div class="card">
        <div class="filter-row">
          <span class="tag active" onclick="filterReminder('upcoming',this)">即将到期</span>
          <span class="tag" onclick="filterReminder('all',this)">全部</span>
          <span class="tag" onclick="filterReminder('past',this)">已过期</span>
        </div>
        <div class="list" id="reminder-list"></div>
      </div>
    </section>
  </div>
</main>

<div class="bottom-nav" id="bottom-nav" style="display:none">
  <button class="nav-btn active" onclick="switchTab('schedule')">
    <span class="nav-icon">📅</span>
    <span>日程</span>
  </button>
  <button class="nav-btn" onclick="switchTab('inspiration')">
    <span class="nav-icon">💡</span>
    <span>灵感</span>
  </button>
  <button class="nav-btn" onclick="switchTab('project')">
    <span class="nav-icon">📊</span>
    <span>项目</span>
  </button>
  <button class="nav-btn" onclick="switchTab('reminder')">
    <span class="nav-icon">🔔</span>
    <span>提醒</span>
  </button>
</div>

<div class="modal-overlay" id="project-modal">
  <div class="modal">
    <h2 id="pm-title">项目流程</h2>
    <div id="pm-content"></div>
    <div style="display:flex;gap:10px;margin-top:16px;justify-content:flex-end">
      <button class="btn-outline" onclick="closeModal()">关闭</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://xvhpxhjyszrrfbyuaozb.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_RWO4RqhxpD02NC6e4Y890Q_w1dlNnnp";
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let user = null;
let categories = [];
let schedules = [];
let inspirations = [];
let projects = [];
let projectTasks = [];
let reminders = [];
let filterScheduleMode = 'all';
let filterInspirationMode = 'all';
let filterReminderMode = 'upcoming';
let reportType = 'day';
let activeProjectId = null;

async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) return msg('请填写邮箱和密码');
  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
  if (error) return msg(error.message);
  user = data.user;
  showApp();
}

async function handleRegister() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) return msg('请填写邮箱和密码');
  if (password.length < 6) return msg('密码至少6位');
  const { data, error } = await supabaseClient.auth.signUp({ email, password });
  if (error) return msg(error.message);
  msg('注册成功，请查收邮箱确认邮件后登录');
}

async function initSession() {
  const { data } = await supabaseClient.auth.getSession();
  if (data.session) {
    user = data.session.user;
    showApp();
  }
}

function msg(text) {
  document.getElementById('login-msg').textContent = text;
}

async function showApp() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  document.getElementById('bottom-nav').style.display = 'flex';
  document.getElementById('app-title').textContent = '日程灵感项目提醒工具';
  document.getElementById('app-subtitle').textContent = '记录日程、捕捉灵感、管理项目进度、设置智能提醒';
  await fetchCategories();
  await loadAllData();
  initReminders();
}

async function fetchCategories() {
  const { data } = await supabaseClient.from('categories').select('*').order('name');
  categories = data || [];
  const sel = document.getElementById('s-category');
  sel.innerHTML = '<option value="">选择分类</option>' + categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
}

async function loadAllData() {
  await Promise.all([
    loadSchedules(),
    loadInspirations(),
    loadProjects(),
    loadReminders()
  ]);
}

async function loadSchedules() {
  const { data } = await supabaseClient.from('schedules').select('*').eq('user_id', user.id).order('date', { ascending: false });
  schedules = data || [];
  renderSchedules();
  renderScheduleStats();
  generateReport();
}

async function loadInspirations() {
  const { data } = await supabaseClient.from('inspirations').select('*').eq('user_id', user.id).order('created_at', { ascending: false });
  inspirations = data || [];
  renderInspirations();
  renderInspirationStats();
}

async function loadProjects() {
  const { data: p } = await supabaseClient.from('projects').select('*').eq('user_id', user.id).order('created_at', { ascending: false });
  const { data: t } = await supabaseClient.from('project_tasks').select('*').in('project_id', (p || []).map(x => x.id));
  projects = p || [];
  projectTasks = t || [];
  renderProjects();
  renderProjectStats();
}

async function loadReminders() {
  const { data } = await supabaseClient.from('reminders').select('*').eq('user_id', user.id).order('remind_at', { ascending: true });
  reminders = data || [];
  renderReminders();
  renderReminderStats();
}

function switchTab(tab) {
  document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-' + tab).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');
}

/* ========== 日程 ========== */
async function addSchedule() {
  const title = document.getElementById('s-title').value.trim();
  const category_id = document.getElementById('s-category').value;
  const date = document.getElementById('s-date').value;
  const start_time = document.getElementById('s-start').value;
  const end_time = document.getElementById('s-end').value;
  const description = document.getElementById('s-desc').value.trim();
  if (!title || !date) return alert('标题和日期必填');
  await supabaseClient.from('schedules').insert([{ user_id: user.id, title, category_id: category_id || null, date, start_time, end_time, description }]);
  document.getElementById('s-title').value = '';
  document.getElementById('s-desc').value = '';
  await loadSchedules();
}

async function toggleSchedule(id, completed) {
  await supabaseClient.from('schedules').update({ completed: !completed }).eq('id', id);
  await loadSchedules();
}

async function deleteSchedule(id) {
  if (!confirm('确定删除？')) return;
  await supabaseClient.from('schedules').delete().eq('id', id);
  await loadSchedules();
}

function filterSchedule(mode, el) {
  filterScheduleMode = mode;
  document.querySelectorAll('#sec-schedule .tag').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  renderSchedules();
}

function renderSchedules() {
  const search = document.getElementById('s-search').value.trim().toLowerCase();
  const now = new Date();
  let list = schedules;
  if (filterScheduleMode === 'today') {
    const t = fmt(now);
    list = list.filter(s => s.date === t);
  } else if (filterScheduleMode === 'week') {
    const [ws, we] = weekRange(now);
    list = list.filter(s => s.date >= ws && s.date <= we);
  } else if (filterScheduleMode === 'month') {
    list = list.filter(s => s.date && s.date.startsWith(fmt(now).slice(0,7)));
  } else if (filterScheduleMode === 'completed') {
    list = list.filter(s => s.completed);
  }
  if (search) list = list.filter(s => (s.title + (s.description || '')).toLowerCase().includes(search));
  const el = document.getElementById('schedule-list');
  if (!list.length) { el.innerHTML = '<div class="empty">暂无日程</div>'; return; }
  el.innerHTML = list.map(s => {
    const cat = categories.find(c => c.id === s.category_id);
    const catName = cat ? `<span style="display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;background:${cat.color || '#3b82f6'}20;color:${cat.color || '#3b82f6'};margin-right:6px">${cat.name}</span>` : '';
    return `<div class="item ${s.completed ? 'completed' : ''}">
      <h3>${catName}${esc(s.title)}</h3>
      <p>${esc(s.description || '')}</p>
      <div class="meta">${s.date || ''} ${s.start_time || ''}${s.start_time && s.end_time ? ' - ' : ''}${s.end_time || ''}</div>
      <div class="actions">
        <button class="btn-sm ${s.completed ? 'btn-outline' : 'btn-success'}" onclick="toggleSchedule('${s.id}',${s.completed})">${s.completed ? '标记未完成' : '标记完成'}</button>
        <button class="btn-sm btn-danger" onclick="deleteSchedule('${s.id}')">删除</button>
      </div>
    </div>`;
  }).join('');
}

function renderScheduleStats() {
  const today = fmt(new Date());
  const total = schedules.length;
  const done = schedules.filter(s => s.completed).length;
  const todayCount = schedules.filter(s => s.date === today).length;
  const todayDone = schedules.filter(s => s.date === today && s.completed).length;
  document.getElementById('schedule-stats').innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">总日程</div></div>
    <div class="stat-card"><div class="stat-num">${done}</div><div class="stat-label">已完成</div></div>
    <div class="stat-card"><div class="stat-num">${todayCount}</div><div class="stat-label">今日待办</div></div>
    <div class="stat-card"><div class="stat-num">${todayDone}</div><div class="stat-label">今日完成</div></div>
  `;
}

/* ========== 灵感 ========== */
async function addInspiration() {
  const content = document.getElementById('i-content').value.trim();
  const category = document.getElementById('i-category').value.trim();
  if (!content) return alert('请输入灵感内容');
  await supabaseClient.from('inspirations').insert([{ user_id: user.id, content, category: category || '未分类' }]);
  document.getElementById('i-content').value = '';
  document.getElementById('i-category').value = '';
  await loadInspirations();
}

async function deleteInspiration(id) {
  if (!confirm('确定删除这条灵感？')) return;
  await supabaseClient.from('inspirations').delete().eq('id', id);
  await loadInspirations();
}

function filterInspiration(mode, el) {
  filterInspirationMode = mode;
  document.querySelectorAll('#sec-inspiration .tag').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  renderInspirations();
}

function renderInspirations() {
  const search = document.getElementById('i-search').value.trim().toLowerCase();
  const now = new Date();
  let list = inspirations;
  if (filterInspirationMode === 'today') {
    const t = fmt(now);
    list = list.filter(i => i.created_at && i.created_at.startsWith(t));
  } else if (filterInspirationMode === 'week') {
    const [ws, we] = weekRange(now);
    list = list.filter(i => i.created_at && i.created_at.slice(0,10) >= ws && i.created_at.slice(0,10) <= we);
  }
  if (search) list = list.filter(i => (i.content + (i.category || '')).toLowerCase().includes(search));
  const el = document.getElementById('inspiration-list');
  if (!list.length) { el.innerHTML = '<div class="empty">还没有记录灵感，快去捕捉一个好点子吧！</div>'; return; }
  el.innerHTML = list.map(i => `
    <div class="item">
      <p style="font-size:16px;line-height:1.7;margin-bottom:8px">${esc(i.content)}</p>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span style="display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;background:var(--purple)20;color:var(--purple)">${esc(i.category || '未分类')}</span>
        <span class="meta">${i.created_at ? i.created_at.slice(0,16).replace('T',' ') : ''}</span>
      </div>
      <div class="actions">
        <button class="btn-sm btn-danger" onclick="deleteInspiration('${i.id}')">删除</button>
      </div>
    </div>
  `).join('');
}

function renderInspirationStats() {
  const total = inspirations.length;
  const today = fmt(new Date());
  const todayCount = inspirations.filter(i => i.created_at && i.created_at.startsWith(today)).length;
  const categories = [...new Set(inspirations.map(i => i.category).filter(Boolean))];
  document.getElementById('inspiration-stats').innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">总灵感</div></div>
    <div class="stat-card"><div class="stat-num">${todayCount}</div><div class="stat-label">今日新增</div></div>
    <div class="stat-card"><div class="stat-num">${categories.length}</div><div class="stat-label">分类数</div></div>
  `;
}

/* ========== 项目 ========== */
async function addProject() {
  const name = document.getElementById('p-name').value.trim();
  const description = document.getElementById('p-desc').value.trim();
  const due_date = document.getElementById('p-due').value;
  if (!name) return alert('项目名称必填');
  const { data, error } = await supabaseClient.from('projects').insert([{ user_id: user.id, name, description, due_date, status: 'planning', progress: 0 }]).select().single();
  if (error) return alert(error.message);
  document.getElementById('p-name').value = '';
  document.getElementById('p-desc').value = '';
  document.getElementById('p-due').value = '';
  activeProjectId = data.id;
  showProjectModal(data.id);
  await loadProjects();
}

async function addProjectTask(projectId) {
  const title = document.getElementById('pt-title').value.trim();
  if (!title) return alert('任务名称必填');
  const order = projectTasks.filter(t => t.project_id === projectId).length;
  await supabaseClient.from('project_tasks').insert([{ project_id: projectId, title, status: 'pending', order }]);
  document.getElementById('pt-title').value = '';
  await loadProjects();
  showProjectModal(projectId);
}

async function toggleTask(taskId, completed) {
  await supabaseClient.from('project_tasks').update({ completed: !completed }).eq('id', taskId);
  await loadProjects();
  if (activeProjectId) showProjectModal(activeProjectId);
}

async function deleteTask(taskId) {
  if (!confirm('确定删除这个任务？')) return;
  await supabaseClient.from('project_tasks').delete().eq('id', taskId);
  await loadProjects();
  if (activeProjectId) showProjectModal(activeProjectId);
}

async function deleteProject(id) {
  if (!confirm('确定删除这个项目及所有任务？')) return;
  await supabaseClient.from('project_tasks').delete().eq('project_id', id);
  await supabaseClient.from('projects').delete().eq('id', id);
  await loadProjects();
}

async function updateProjectStatus(id, status) {
  await supabaseClient.from('projects').update({ status }).eq('id', id);
  await loadProjects();
}

function renderProjects() {
  const el = document.getElementById('project-list');
  if (!projects.length) { el.innerHTML = '<div class="empty">还没有项目，创建一个吧</div>'; return; }
  el.innerHTML = projects.map(p => {
    const tasks = projectTasks.filter(t => t.project_id === p.id);
    const done = tasks.filter(t => t.completed).length;
    const total = tasks.length;
    const progress = total > 0 ? Math.round(done / total * 100) : 0;
    const statusClass = p.status === 'planning' ? 'status-planning' : p.status === 'progress' ? 'status-progress' : p.status === 'review' ? 'status-review' : 'status-done';
    const statusText = p.status === 'planning' ? '规划中' : p.status === 'progress' ? '进行中' : p.status === 'review' ? '审核中' : '已完成';
    return `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap">
        <div>
          <h3 style="margin:0 0 6px">${esc(p.name)} <span class="project-status ${statusClass}">${statusText}</span></h3>
          <p style="margin:0;color:var(--muted);font-size:14px">${esc(p.description || '')}</p>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn-sm" onclick="showProjectModal('${p.id}')">管理流程</button>
          <button class="btn-sm btn-outline" onclick="deleteProject('${p.id}')">删除</button>
        </div>
      </div>
      <div class="progress-wrap"><div class="progress-bar" style="width:${progress}%"></div></div>
      <div style="display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--muted)">
        <span>进度 ${progress}% (${done}/${total} 任务)</span>
        <span>${p.due_date ? '截止 ' + p.due_date : ''}</span>
      </div>
      <div class="actions" style="margin-top:8px">
        <select class="btn-sm btn-outline" style="padding:6px 10px" onchange="updateProjectStatus('${p.id}',this.value)">
          <option value="planning" ${p.status==='planning'?'selected':''}>规划中</option>
          <option value="progress" ${p.status==='progress'?'selected':''}>进行中</option>
          <option value="review" ${p.status==='review'?'selected':''}>审核中</option>
          <option value="done" ${p.status==='done'?'selected':''}>已完成</option>
        </select>
      </div>
    </div>`;
  }).join('');
}

function renderProjectStats() {
  const total = projects.length;
  const done = projects.filter(p => p.status === 'done').length;
  const inProgress = projects.filter(p => p.status === 'progress').length;
  document.getElementById('project-stats').innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">总项目</div></div>
    <div class="stat-card"><div class="stat-num">${inProgress}</div><div class="stat-label">进行中</div></div>
    <div class="stat-card"><div class="stat-num">${done}</div><div class="stat-label">已完成</div></div>
  `;
}

function showProjectModal(projectId) {
  activeProjectId = projectId;
  const p = projects.find(x => x.id === projectId);
  const tasks = projectTasks.filter(t => t.project_id === projectId).sort((a,b) => a.order - b.order);
  document.getElementById('pm-title').textContent = p ? p.name + ' - 流程管理' : '项目流程';
  let html = `
    <div style="margin-bottom:16px">
      <input id="pt-title" placeholder="添加新任务..." style="max-width:320px" />
      <button class="btn btn-sm" style="margin-left:8px" onclick="addProjectTask('${projectId}')">添加任务</button>
    </div>
  `;
  if (!tasks.length) {
    html += '<div class="empty">还没有任务，添加一个吧</div>';
  } else {
    html += tasks.map((t, idx) => `
      <div class="task-row">
        <input type="checkbox" class="checkbox" ${t.completed ? 'checked' : ''} onchange="toggleTask('${t.id}',${t.completed})" />
        <span class="${t.completed ? 'task-done' : ''}" style="flex:1">${esc(t.title)}</span>
        <button class="btn-sm btn-danger" onclick="deleteTask('${t.id}')">删除</button>
      </div>
    `).join('');
  }
  document.getElementById('pm-content').innerHTML = html;
  document.getElementById('project-modal').classList.add('visible');
}

function closeModal() {
  document.getElementById('project-modal').classList.remove('visible');
  activeProjectId = null;
}

/* ========== 提醒 ========== */
async function addReminder() {
  const title = document.getElementById('r-title').value.trim();
  const remind_at = document.getElementById('r-time').value;
  if (!title || !remind_at) return alert('请填写提醒内容和时间');
  await supabaseClient.from('reminders').insert([{ user_id: user.id, title, remind_at, is_read: false }]);
  document.getElementById('r-title').value = '';
  document.getElementById('r-time').value = '';
  await loadReminders();
}

async function deleteReminder(id) {
  if (!confirm('确定删除这个提醒？')) return;
  await supabaseClient.from('reminders').delete().eq('id', id);
  await loadReminders();
}

async function markReminderRead(id) {
  await supabaseClient.from('reminders').update({ is_read: true }).eq('id', id);
  await loadReminders();
}

function filterReminder(mode, el) {
  filterReminderMode = mode;
  document.querySelectorAll('#sec-reminder .tag').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  renderReminders();
}

function renderReminders() {
  const now = new Date().toISOString();
  let list = reminders;
  if (filterReminderMode === 'upcoming') {
    list = list.filter(r => r.remind_at >= now && !r.is_read);
  } else if (filterReminderMode === 'past') {
    list = list.filter(r => r.remind_at < now);
  }
  const el = document.getElementById('reminder-list');
  if (!list.length) { el.innerHTML = '<div class="empty">暂无提醒</div>'; return; }
  el.innerHTML = list.map(r => {
    const isPast = r.remind_at < now;
    return `
    <div class="item reminder-item">
      <div class="reminder-content">
        <div style="font-weight:600;margin-bottom:4px;${r.is_read?'opacity:.5;text-decoration:line-through':''}">${esc(r.title)}</div>
        <div class="reminder-time" style="color:${isPast ? 'var(--danger)' : 'var(--muted)'}">
          ${isPast ? '⏰ 已过期: ' : '📅 '}${r.remind_at.replace('T',' ').slice(0,16)}
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${!r.is_read ? `<button class="btn-sm btn-success" onclick="markReminderRead('${r.id}')">标记已读</button>` : ''}
        <button class="btn-sm btn-danger" onclick="deleteReminder('${r.id}')">删除</button>
      </div>
    </div>`;
  }).join('');
}

function renderReminderStats() {
  const now = new Date().toISOString();
  const total = reminders.length;
  const upcoming = reminders.filter(r => r.remind_at >= now && !r.is_read).length;
  const past = reminders.filter(r => r.remind_at < now && !r.is_read).length;
  document.getElementById('reminder-stats').innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">总提醒</div></div>
    <div class="stat-card"><div class="stat-num">${upcoming}</div><div class="stat-label">即将到期</div></div>
    <div class="stat-card"><div class="stat-num">${past}</div><div class="stat-label">已过期未读</div></div>
  `;
}

/* ========== 提醒通知 ========== */
function requestNotification() {
  if (!('Notification' in window)) return alert('您的浏览器不支持提醒通知');
  Notification.requestPermission().then(p => {
    if (p === 'granted') {
      document.getElementById('notify-banner').classList.remove('visible');
      alert('已开启浏览器提醒');
    } else {
      alert('请允许通知权限才能收到提醒');
    }
  });
}

function initReminders() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    document.getElementById('notify-banner').classList.add('visible');
  }
  setInterval(checkReminders, 30000);
}

async function checkReminders() {
  if (Notification.permission !== 'granted') return;
  const now = new Date().toISOString();
  const fiveMinLater = new Date(Date.now() + 5 * 60000).toISOString();
  const { data } = await supabaseClient.from('reminders')
    .select('*')
    .eq('user_id', user.id)
    .eq('is_read', false)
    .gte('remind_at', now)
    .lte('remind_at', fiveMinLater);
  (data || []).forEach(r => {
    new Notification('日程提醒', { body: r.title, icon: '' });
    supabaseClient.from('reminders').update({ is_read: true }).eq('id', r.id);
  });
}

/* ========== 报告 ========== */
function setReportType(type, el) {
  reportType = type;
  document.querySelectorAll('#sec-schedule .card:last-child .tag').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  generateReport();
}

function generateReport() {
  const now = new Date();
  let range = '';
  let list = [];
  if (reportType === 'day') {
    const d = fmt(now);
    range = d;
    list = schedules.filter(s => s.date === d);
  } else if (reportType === 'week') {
    const [ws, we] = weekRange(now);
    range = `${ws} ~ ${we}`;
    list = schedules.filter(s => s.date >= ws && s.date <= we);
  } else {
    const m = fmt(now).slice(0,7);
    range = m;
    list = schedules.filter(s => s.date && s.date.startsWith(m));
  }
  const done = list.filter(s => s.completed).length;
  const total = list.length;
  const rate = total ? Math.round(done / total * 100) : 0;
  const cats = {};
  list.forEach(s => {
    const c = categories.find(x => x.id === s.category_id);
    const n = c ? c.name : '未分类';
    if (!cats[n]) cats[n] = [];
    cats[n].push(s);
  });
  let lines = [`${reportType==='day'?'日报':reportType==='week'?'周报':'月报'}`, `统计周期: ${range}`, `完成率: ${done}/${total} (${rate}%)`, ''];
  if (!total) lines.push('本周期暂无日程记录。');
  for (const [name, items] of Object.entries(cats)) {
    lines.push(`【${name}】`);
    items.forEach(s => lines.push(`- ${s.completed?'[已完成]':'[待完成]'} ${s.title}${s.description?': '+s.description:''}`));
    lines.push('');
  }
  document.getElementById('report-output').textContent = lines.join('\n');
}

function copyReport() {
  navigator.clipboard.writeText(document.getElementById('report-output').textContent).then(() => alert('已复制到剪贴板'));
}

function downloadReport() {
  const blob = new Blob([document.getElementById('report-output').textContent], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `report-${fmt(new Date())}.txt`;
  a.click();
}

/* ========== 工具函数 ========== */
function fmt(d) { return d.toISOString().slice(0,10); }
function weekRange(d) {
  const day = d.getDay() || 7;
  const s = new Date(d); s.setDate(d.getDate() - day + 1);
  const e = new Date(d); e.setDate(d.getDate() + (7 - day));
  return [fmt(s), fmt(e)];
}
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

/* ========== 初始化 ========== */
initSession();
</script>
